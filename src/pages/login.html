<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Space+Grotesk:wght@300..700&display=swap"
        rel="stylesheet">
    <link rel="icon" href="../assets/icons/favicon.ico" type="image/x-icon">
    <title>Zenit | Entrar</title>
</head>

<body>

    <main class="login-pagina">
        <div class="login-card">

            <a href="index.html">
                <img src="../assets/logo-transparent.svg" alt="Logo Zenit" class="login-logo">
            </a>
            <p class="login-subtitulo">Entre com sua conta</p>

            <div class="login-erro">
                <p>Crie uma conta para continuar.</p>
            </div>

            <div class="form-group">
                <label class="form-label">E-mail</label>
                <input class="form-input" type="email" placeholder="exemplo@email.com" disabled>
            </div>

            <div class="form-group">
                <label class="form-label">Senha</label>
                <input class="form-input" type="password" placeholder="Sua senha" disabled>
            </div>

            <button class="btn-entrar" disabled>Entrar</button>

            <div class="login-links">
                <a href="cadastro.html">Criar uma conta</a>
                <span>·</span>
                <a href="../../index.html">Voltar</a>
            </div>

        </div>
    </main>

</body>

</html>
